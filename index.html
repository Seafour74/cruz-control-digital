<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cruz Control Digital | Coming Soon</title>

  <meta name="description" content="Cruz Control Digital — boutique digital marketing for real estate professionals. Coming soon.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://cruzcontroldigital.com/">
  <link rel="icon" type="image/png" href="images/logo_transparent.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Outfit:wght@700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #111111;
      color: #F5F3EE;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    .wrap {
      max-width: 560px;
    }

    .brand {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 800;
      background: linear-gradient(135deg, #C7A15A, #A6823F);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(135deg, #C7A15A, #A6823F);
      margin: 28px auto;
      border-radius: 2px;
    }

    .label {
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(245, 243, 238, 0.5);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="brand">Cruz Control Digital</p>
    <div class="divider"></div>
    <p class="label">Coming Soon</p>
  </div>
</body>
</html>
